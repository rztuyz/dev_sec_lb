name: security

on:
  workflow_dispatch:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read
  packages: write
  security-events: write

jobs:
  test-and-scan:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest bandit pip-audit

      - name: Run tests
        run: pytest

      - name: Static security scan
        continue-on-error: true
        run: bandit -r app

      - name: Dependency vulnerability scan
        continue-on-error: true
        run: pip-audit

  docker:
    runs-on: ubuntu-latest
    needs: test-and-scan
    steps:
      - uses: actions/checkout@v5

      - name: Build image
        run: docker build -t devsecops-demo:${{ github.sha }} .

      - name: Scan image with Trivy
        continue-on-error: true
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: devsecops-demo:${{ github.sha }}
          severity: CRITICAL,HIGH
          exit-code: "1"

      - name: Login to GitHub Container Registry
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish image
        if: github.ref == 'refs/heads/main'
        run: |
          IMAGE=ghcr.io/${{ github.repository }}/devsecops-demo:${{ github.sha }}
          docker tag devsecops-demo:${{ github.sha }} $IMAGE
          docker push $IMAGE
